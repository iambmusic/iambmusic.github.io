<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="styles.css?v=20260321-no-source-chips">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <header class="site-header">
    <div class="container nav-wrap">
      <nav class="nav">
        <a href="index.html#home" data-nav-label="home">Home</a>
        <a href="index.html#plattformen" data-nav-label="platforms">Plattformen</a>
        <a href="musik.html" data-nav-label="music">Musik</a>
        <a href="about.html" data-nav-label="about">&Uuml;ber Mich</a>
      </nav>
      <div class="header-audio" data-audio-player>
        <audio id="site-audio" preload="metadata" loop></audio>
        <button class="audio-btn audio-play-btn" type="button" data-audio-play aria-label="Play background music" aria-pressed="false">
          <img src="assets/icons/play.svg" alt="" data-audio-play-icon>
        </button>
        <div class="audio-meta">
          <span class="audio-now-label">Now Playing</span>
          <span class="audio-track-name" data-audio-track-name>Welcome 1</span>
        </div>
        <div class="audio-track-switch" data-audio-track-switch></div>
      </div>
      <div class="creator-switch" data-creator-switch aria-label="Creator ausw&auml;hlen"></div>
      <div class="language-switch" data-language-switch aria-label="Sprache ausw&auml;hlen"></div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container section-head stacked-head glow-anchor" data-animate>
        <h1 data-music-title></h1>
        <p data-music-intro></p>
      </div>
      <div class="container media-filters" data-media-filters data-animate></div>
      <div class="container feed-status" id="youtube-status">Videos werden geladen.</div>
      <div class="container release-grid" id="youtube-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="footer-legal" data-footer-legal></p>
        <div class="footer-contact">
          <h3 data-footer-contact-title></h3>
          <a class="footer-email" href="" data-footer-email></a>
        </div>
      </div>
      <div class="footer-platforms">
        <h3 data-footer-platforms-title></h3>
        <div class="contact-links" data-footer-platforms></div>
      </div>
    </div>
  </footer>

  <script src="script.js?v=20260321-no-source-chips"></script>
</body>
</html>
