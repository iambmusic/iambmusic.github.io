<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="styles.css?v=20260321-no-source-chips">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <header class="site-header">
    <div class="container nav-wrap">
      <nav class="nav">
        <a href="index.html#home">Home</a>
        <a href="index.html#plattformen">Plattformen</a>
        <a href="musik.html">Musik</a>
        <a href="about.html">&Uuml;ber Mich</a>
      </nav>
      <div class="creator-switch" data-creator-switch aria-label="Creator ausw&auml;hlen"></div>
      <div class="header-audio" data-audio-player>
        <audio id="site-audio" preload="metadata" loop></audio>
        <button class="audio-btn audio-play-btn" type="button" data-audio-play aria-label="Play background music" aria-pressed="false">
          <img src="assets/icons/play.svg" alt="" data-audio-play-icon>
        </button>
        <div class="audio-meta">
          <span class="audio-now-label">Now Playing</span>
          <span class="audio-track-name" data-audio-track-name>Track 1</span>
        </div>
        <div class="audio-track-switch">
          <button class="audio-btn audio-track-btn is-active" type="button" data-audio-track="0" aria-pressed="true" aria-label="Play Track 1">1</button>
          <button class="audio-btn audio-track-btn" type="button" data-audio-track="1" aria-pressed="false" aria-label="Play Track 2">2</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="home" class="section hero">
      <div class="container hero-grid">
        <div class="hero-media" data-animate>
          <div class="logo-visualizer">
            <canvas id="audio-visualizer" aria-label="Circular Sound Visualizer" role="img"></canvas>
            <div class="logo-ring"></div>
            <img class="logo" src="" alt="" data-creator-logo>
          </div>
        </div>
        <div class="hero-copy glow-anchor" data-animate>
          <p class="eyebrow" data-hero-eyebrow></p>
          <h1 data-hero-title></h1>
          <p class="lead" data-hero-lead></p>
          <div class="cta-row">
            <a class="btn primary btn-cta-pulse cta-music-btn" href="musik.html">
              <span>Musik entdecken</span>
            </a>
            <a class="btn ghost" href="about.html#about">&Uuml;ber mich</a>
          </div>
        </div>
      </div>

      <div class="container latest-video">
        <div class="latest-video-intro" data-animate>
          <h2 data-latest-title></h2>
        </div>
        <div class="latest-video-card" id="latest-video-card" data-animate>
          <p class="feed-status">Neueste Uploads werden geladen.</p>
        </div>
      </div>

      <div id="plattformen" class="container section-head platforms-head full-head" data-animate>
        <h2>Plattformen</h2>
        <p data-platforms-intro></p>
      </div>
      <div class="container platform-grid" data-platform-grid></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="footer-legal" data-footer-legal></p>
        <div class="footer-contact">
          <h3 data-footer-contact-title></h3>
          <a class="footer-email" href="" data-footer-email></a>
        </div>
      </div>
      <div class="footer-platforms">
        <h3 data-footer-platforms-title></h3>
        <div class="contact-links" data-footer-platforms></div>
      </div>
    </div>
  </footer>

  <script src="script.js?v=20260321-no-source-chips"></script>
</body>
</html>
